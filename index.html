<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FAFCF8">
<title>FarmPlanet</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FarmPlanet">

<style>
:root{
 --bg:#FAFCF8; --card:#FFFFFF; --edge:#E8EDE6;
 --ink:#2B3230; --deep:#2E8C49; --deep2:#256F3B; --btn:#3FA05A;
 --sub:#9AA79D; --coral:#ff7d59; --warn:#c2410c;
 --peak:#f3e8ff;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#eef1ec;display:flex;justify-content:center}
.app{width:100%;max-width:430px;height:100dvh;background:var(--bg);display:flex;flex-direction:column;position:relative}
@media(min-width:500px){body{padding:18px 0}.app{height:calc(100dvh - 36px);border-radius:24px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.18)}}
svg.li{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex:none;vertical-align:-3px}
svg.li.lg{width:20px;height:20px} svg.li.sm{width:13px;height:13px}
/* 상단 */
.top{padding:12px 16px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--edge)}
.logo{display:flex;align-items:center}
.brandimg{height:19px;display:block}
.role{border:1px solid var(--edge);background:#F0F4EE;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--sub);cursor:pointer}
/* 본문 */
.screen{flex:1;overflow-y:auto;padding:6px 16px 20px}
.title{font-size:17px;font-weight:800;margin:6px 0 10px;display:flex;align-items:center;gap:6px}
.title svg.li{color:var(--deep)}
.hero{background:linear-gradient(135deg,#43AB60,#2E8C49);border-radius:8px;padding:16px;color:#fff;margin-bottom:12px;box-shadow:0 6px 16px rgba(62,160,90,.22)}
.hero .hi{font-size:11px;opacity:.85}
.hero .big{font-size:17px;font-weight:800;margin:4px 0}
.hero .sh{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.16);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.qbtn{background:var(--card);border:1px solid var(--edge);border-radius:8px;padding:13px 12px;cursor:pointer;font-size:12.5px;font-weight:700;color:var(--ink)}
.qbtn svg.li{color:var(--deep);display:block;margin-bottom:6px;width:20px;height:20px}
.qbtn .bdg{color:var(--coral);font-weight:800}
.card{background:var(--card);border:1px solid var(--edge);border-radius:8px;padding:13px 14px;margin-bottom:10px}
.card h3{font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:5px;color:var(--ink)}
.card h3 svg.li{color:var(--deep)}
.muted{color:var(--sub);font-size:12.5px;line-height:1.6}
.note-card{background:#EDF7F0;border:1px solid #DBE9DD}
.grp{font-size:11.5px;font-weight:800;color:var(--deep);margin:13px 0 7px;display:flex;align-items:center;gap:5px}
.btn{width:100%;border:none;border-radius:7px;background:var(--btn);color:#fff;padding:13px;font-size:13.5px;font-weight:800;cursor:pointer}
.btn:disabled{background:#dbe3da;color:#9aa79d}
.btn.sec{background:#fff;color:var(--deep);border:1.5px solid var(--edge);font-weight:700}
.row{display:flex;gap:8px}
.row .btn{flex:1}
.seg{display:flex;gap:6px;margin-bottom:11px}
.seg button{flex:1;border:1px solid var(--edge);background:#fff;color:var(--sub);border-radius:7px;padding:9px 0;font-size:12px;font-weight:800;cursor:pointer}
.seg button.on{background:var(--deep);border-color:var(--deep);color:#fff}
.pill{background:#EDF7F0;color:var(--deep);border-radius:6px;padding:2px 8px;font-size:10.5px;font-weight:800}
.pill.hot{background:#fdeceb;color:#b04a3f}.pill.ice{background:#e3f0fb;color:#2b6cb0}
.search{width:100%;border:1px solid var(--edge);border-radius:7px;padding:11px 13px;font-size:13px;margin-bottom:11px;background:#fff}
.inp{width:100%;border:1px solid var(--edge);border-radius:7px;padding:11px;font-size:13px;background:#fff;font-family:inherit;min-height:64px;resize:none}
input.inp{min-height:auto}
/* 체크리스트 */
.ck{background:#fff;border:1px solid var(--edge);border-radius:7px;padding:10px 12px;display:flex;gap:10px;align-items:center;margin-bottom:6px}
.ck .box{width:19px;height:19px;border-radius:5px;border:1.6px solid #cfd8cf;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;cursor:pointer}
.ck.done .box{background:var(--btn);border-color:var(--btn)}
.ck .tx{font-size:12.5px;font-weight:600;flex:1}
.ck.done .tx{color:#a9bfae;text-decoration:line-through}
.prog{height:6px;background:var(--edge);border-radius:4px;margin:6px 0 12px}
.prog i{display:block;height:6px;border-radius:4px;background:linear-gradient(90deg,#43AB60,#2E8C49)}
.warnbox{background:#fdf3e7;border:1px solid #f0d9bd;color:#8a5a1f;border-radius:7px;padding:10px 12px;font-size:12px;line-height:1.6}
.cam{border:1px solid var(--edge);background:#fff;color:var(--deep);border-radius:6px;padding:6px 10px;font-size:11px;font-weight:800;cursor:pointer;flex:none}
/* 매뉴얼 */
.acc{background:#fff;border:1px solid var(--edge);border-radius:8px;margin-bottom:8px;overflow:hidden}
.acc .h{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;font-size:13px;font-weight:800;cursor:pointer}
.acc .b{display:none;padding:0 14px 13px;font-size:12.5px;line-height:1.7;color:#4a5c4f}
.acc.open .b{display:block}
.acc .chev{color:var(--sub);transition:.15s}
.acc.open .chev{transform:rotate(180deg)}
.clean{list-style:none}.clean li{padding:4px 0 4px 14px;position:relative}
.clean li::before{content:"·";position:absolute;left:2px;color:var(--deep);font-weight:900}
.step{margin-left:18px}.step li{padding:3px 0}
.ritem{background:#fff;border:1px solid var(--edge);border-radius:8px;padding:11px 13px;margin-bottom:8px}
.ritem .rn{font-size:13px;font-weight:800;margin-bottom:6px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.mimg{width:100%;border-radius:7px;border:1px solid var(--edge);margin:8px 0}
.rtable{width:100%;border-collapse:collapse;font-size:12px}
.rtable td{padding:4px 6px;border-top:1px solid #f2f4f0;color:#4a5c4f}
.rtable td:first-child{color:var(--sub);width:88px;font-weight:700}
/* 공지 */
.note{background:#fff;border:1px solid var(--edge);border-radius:8px;padding:12px 13px;margin-bottom:8px}
.note .nm{font-size:12px;font-weight:800;display:flex;gap:6px;align-items:center}
.note .dt{font-size:10.5px;color:var(--sub);margin:2px 0 6px}
.note .bd{font-size:12.5px;line-height:1.65;color:#3d4f42}
/* 발주방 */
.omsg{margin-bottom:10px}
.ometa{font-size:10.5px;color:var(--sub);margin:0 0 3px 4px}
.obub{background:#fff;border:1px solid var(--edge);border-radius:2px 10px 10px 10px;padding:10px 12px;display:flex;align-items:center;gap:10px;max-width:94%}
.obx{width:19px;height:19px;border-radius:5px;border:1.6px solid #cfd8cf;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.obub.done .obx{background:var(--btn);border-color:var(--btn)}
.otx{font-size:13px;font-weight:600}
.obub.done .otx{color:#a9bfae;text-decoration:line-through}
.ost{margin-left:auto;font-size:10px;font-weight:800;color:var(--coral);flex:none}
.obub.done .ost{color:var(--deep)}
/* 시간표 */
.dsel{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.dchip{border:1px solid var(--edge);background:#fff;color:var(--ink);border-radius:6px;padding:6px 9px;font-size:11px;font-weight:700;cursor:pointer}
.dchip.on{background:var(--deep);border-color:var(--deep);color:#fff}
.wnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.wnav .wk{font-size:12.5px;font-weight:800;color:var(--ink)}
.wnav button{border:1px solid var(--edge);background:#fff;border-radius:6px;width:30px;height:30px;cursor:pointer;color:var(--deep);display:flex;align-items:center;justify-content:center}
.wnav .now{width:auto;padding:0 10px;font-size:11px;font-weight:800}
.wcal{display:flex;gap:2px;margin-bottom:4px}
.wtime{width:18px;flex:none;position:relative;margin-top:34px;height:242px}
.wtime span{position:absolute;right:2px;font-size:8px;color:var(--sub);transform:translateY(-50%)}
.wcol{flex:1;min-width:0;display:flex;flex-direction:column}
.wch{font-size:11px;font-weight:800;text-align:center;color:var(--deep);padding:4px 0;line-height:1.25;cursor:pointer;border-radius:6px}
.wcol.wtoday .wch{background:#E2F0E7}
.wbody{position:relative;height:242px;border-radius:6px;overflow:hidden;background:#fff;
  background-image:repeating-linear-gradient(to bottom,#edf1ea 0 1px,transparent 1px 44px);border:1px solid var(--edge)}
.wpeak{position:absolute;left:0;right:0;background:var(--peak);opacity:.7}
.wsh{position:absolute;color:#3c4a40;font-weight:700;padding:2px 1px;text-align:center;
  overflow:hidden;cursor:pointer;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center}
.z7 .wsh{font-size:9px;line-height:1.25}
.wsh .wt{display:block;font-weight:400;opacity:.85;white-space:nowrap}
.z7 .wsh .wt{font-size:8px}
.wcov{text-align:center;font-size:12px;padding:3px 0;cursor:pointer}
.wcov .wcn{font-size:9px;color:var(--sub);margin-left:2px}
.tl{position:relative;background:#fff;border:1px solid var(--edge);border-radius:7px;padding:10px 6px 22px;overflow:hidden}
.tl .peak{position:absolute;top:0;bottom:0;background:var(--peak);opacity:.7}
.tlrow{display:flex;align-items:center;margin-bottom:7px;position:relative}
.tlname{width:52px;font-size:11px;font-weight:700;flex:none;padding-left:4px}
.tltrack{position:relative;flex:1;height:24px;background:#f2f4f0;border-radius:5px;overflow:hidden}
.tlbar{position:absolute;top:2px;bottom:2px;border-radius:4px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;white-space:nowrap}
.tlaxis{position:absolute;bottom:4px;left:58px;right:6px;height:12px}
.tlaxis span{position:absolute;font-size:8.5px;color:var(--sub);transform:translateX(-50%)}
.lrow{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid #f2f4f0}
.lrow.tot{border-top:2px solid var(--deep);border-bottom:none;margin-top:3px;padding-top:9px;font-size:14px}
/* 모달·토스트·네비 */
.modal{position:absolute;inset:0;background:rgba(20,35,25,.4);display:none;align-items:flex-end;justify-content:center;z-index:30}
.modal.show{display:flex}
.mbox{background:#fff;border-radius:14px 14px 0 0;width:100%;max-width:430px;padding:18px 16px 24px;max-height:82%;overflow-y:auto}
.mbox h3{font-size:15px;margin-bottom:12px}
.fld{margin-bottom:12px}
.fld label{font-size:12px;color:var(--sub);display:block;margin-bottom:5px;font-weight:700}
.tsel{width:100%;padding:11px;border:1.5px solid var(--edge);border-radius:7px;font-size:14px;background:#fff}
.upd{background:var(--deep);color:#fff;font-size:12px;font-weight:700;padding:9px 14px;display:flex;align-items:center;justify-content:center;gap:10px}
.upd button{border:none;border-radius:6px;background:#fff;color:var(--deep);font-size:11.5px;font-weight:800;padding:5px 12px;cursor:pointer}
.toast{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);background:#2B3230;color:#fff;font-size:12.5px;font-weight:700;
  padding:10px 18px;border-radius:8px;opacity:0;pointer-events:none;transition:.25s;z-index:40;white-space:nowrap;max-width:92%;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1}
.nav{display:flex;justify-content:space-around;background:#fff;border-top:1px solid var(--edge);padding:8px 0 max(10px,env(safe-area-inset-bottom))}
.nav button{border:none;background:none;color:#B7C0B8;font-size:9px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;width:60px}
.nav button.on{color:var(--deep)}
.ndot{position:absolute;top:-1px;right:12px;width:7px;height:7px;border-radius:50%;background:#ff7d59}
/* 로그인 */
.login-note{font-size:11.5px;color:var(--sub);text-align:center;line-height:1.7;margin-top:12px}
.reset{font-size:10.5px;color:#b5c4b9;text-align:center;margin-top:14px;cursor:pointer;text-decoration:underline}
</style>
</head>

const WD=['일','월','화','수','목','금','토'];
const dk=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayK=()=>dk(new Date());
function monday(off=0){const n=new Date();n.setHours(0,0,0,0);
 const day=(n.getDay()+6)%7; n.setDate(n.getDate()-day+off*7); return n;}
function buildWeek(off=0){const m=monday(off),tk=todayK(),arr=[];
 for(let i=0;i<7;i++){const d=new Date(m);d.setDate(m.getDate()+i);
  arr.push({k:dk(d),d:d.getDate(),m:d.getMonth()+1,w:WD[d.getDay()],today:dk(d)===tk});}
 return arr;}
let weekOffset=0, WEEK=buildWeek(0);
const TODAY=()=>WEEK.find(x=>x.today)||buildWeek(0).find(x=>x.today);
function fmtDT(){const n=new Date();return `${n.getMonth()+1}/${n.getDate()} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}
function cT(t){return t.replace(':00','');}
function t2n(s){const [a,b]=s.split(':').map(Number);return a+b/60;}
function won(n){return Math.round(n).toLocaleString()+'원';}

function seedWeek(week){
 week.forEach((d,i)=>{
  if(i===0){SHIFTS['me|'+d.k]={s:'12:30',e:'15:00'};SHIFTS['jh|'+d.k]={s:'15:00',e:'17:30'};}
  else if(i<4){SHIFTS['ye|'+d.k]={s:'08:00',e:'13:30'};SHIFTS['me|'+d.k]={s:'11:30',e:'16:00'};SHIFTS['gh|'+d.k]={s:'16:00',e:'19:00'};}
  else if(i===4){SHIFTS['ye|'+d.k]={s:'08:00',e:'12:30'};SHIFTS['me|'+d.k]={s:'11:00',e:'14:00'};SHIFTS['jh|'+d.k]={s:'12:30',e:'16:00'};SHIFTS['gh|'+d.k]={s:'16:00',e:'19:00'};}
  else if(i===5){SHIFTS['me|'+d.k]={s:'12:30',e:'17:30'};}
  else{SHIFTS['dy|'+d.k]={s:'12:30',e:'17:30'};}});
}

 if(list.length && peak.length<PEAK_MIN) warns.push(`피크 인원 ${peak.length}/${PEAK_MIN}명`);
 return {list,peak,count:list.length,warns};
}

   return {s,h,base,juhyu};});
 return {per,th:per.reduce((a,b)=>a+b.h,0),tbase:per.reduce((a,b)=>a+b.base,0),tj:per.reduce((a,b)=>a+b.juhyu,0),

}

function segLayout(dkey){
 const list=STAFF.filter(s=>!onlyMine||s.id===CUR).map(s=>({s,sh:SHIFTS[s.id+'|'+dkey]})).filter(x=>x.sh)
   .map(x=>({s:x.s,sh:x.sh,a:t2n(x.sh.s),b:t2n(x.sh.e)}))
   .sort((p,q)=>p.a-q.a||p.b-q.b);
 const lanes=[];
 list.forEach(x=>{let li=lanes.findIndex(e=>e<=x.a);
   if(li<0){li=lanes.length;lanes.push(0);}
   lanes[li]=x.b; x.lane=li;});
 const bs=[...new Set(list.flatMap(x=>[x.a,x.b]))].sort((x,y)=>x-y);
 const segs=[];
 for(let i=0;i<bs.length-1;i++){
   const t1=bs[i],t2=bs[i+1];
   const act=list.filter(x=>x.a<=t1&&x.b>=t2).sort((p,q)=>p.lane-q.lane);
   act.forEach((x,idx)=>segs.push({x,t1,t2,idx,n:act.length}));
 }
 const best={};
 segs.forEach(g=>{const k=g.x.s.id,area=(g.t2-g.t1)/g.n;
   if(!best[k]||area>best[k].area)best[k]={g,area};});
 segs.forEach(g=>g.lbl=(best[g.x.s.id].g===g));
 return segs;
}

 if(!m)return null;
 let h1=+m[1],m1=+(m[2]||0),h2=+m[3],m2=+(m[4]||0);
 if(m[2]==='5')m1=30; if(m[4]==='5')m2=30;
 if(m1>59||m2>59)return null;
 if(h1<OPEN_H)h1+=12;
 if(h2<OPEN_H)h2+=12;
 if(h2*60+m2<=h1*60+m1)h2+=12;
 if(h1<OPEN_H||h2>CLOSE_H||h2*60+m2<=h1*60+m1)return null;
 const f=(h,mm)=>String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0');

}

const HASH_TH=17; // 예시 대조 허용 오차 (64비트 해밍거리)
function aHash(img){
 try{
  const cv=document.createElement('canvas');cv.width=8;cv.height=8;
  const cx=cv.getContext('2d');cx.drawImage(img,0,0,8,8);
  const d=cx.getImageData(0,0,8,8).data;let g=[],sum=0;
  for(let i=0;i<64;i++){const v=(d[i*4]*299+d[i*4+1]*587+d[i*4+2]*114)/1000;g.push(v);sum+=v;}
  const avg=sum/64;return g.map(v=>v>avg?'1':'0').join('');
 }catch(e){return null;}
}
function hamming(a,b){let n=0;for(let i=0;i<a.length;i++)if(a[i]!==b[i])n++;return n;}
function processImg(inp,cb){
 const f=inp.files&&inp.files[0]; if(!f)return;
 const r=new FileReader();
 r.onload=e=>{
   const img=new Image();
   img.onload=()=>{
     let url=e.target.result;
     try{
       const sc=Math.min(1,900/Math.max(img.width,img.height));
       const cv=document.createElement('canvas');
       cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
       cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
       url=cv.toDataURL('image/jpeg',0.72);
     }catch(err){}
     cb(url,aHash(img));
   };
   img.src=e.target.result;
 };
 r.readAsDataURL(f);
}

 READS[CUR]=READS[CUR]||{}; READS[CUR][noticeView==='order'?'order':'notice']=Date.now(); // 읽음 처리
 const u=unread();
 const seg=`<div class="seg"><button class="${noticeView==='notice'?'on':''}" onclick="noticeView='notice';render()">공지 · 인수인계${u.n?` <b style="color:#ff7d59">${u.n}</b>`:''}</button>
   <button class="${noticeView==='order'?'on':''}" onclick="noticeView='order';render()">발주방${u.o?` <b style="color:#ff7d59">${u.o}</b>`:''}</button></div>`;
 if(noticeView==='order'){
   const STL={wait:['대기','#ff7d59','#fdeceb'],ordered:['발주됨','#9a6b1f','#fdf1df'],done:['구매완료','#2E8C49','#EDF7F0']};
   const waitCnt=ORDERS.filter(o=>o.st==='wait').length;
   const list=ORDERS.map((o,i)=>{const s=STL[o.st]||STL.wait;
     return `<div class="omsg">
     <div class="ometa">${o.who} · ${o.dt}</div>
     <div class="obub ${o.st==='done'?'done':''}">
       <div class="obx" ${admin?`onclick="toggleOrder(${i})"`:''} style="${admin?'cursor:pointer':''}">${o.st==='done'?'✓':''}</div>
       <div class="otx">${o.txt}</div>
       <span class="ost" style="color:${s[1]}">${s[0]}</span>
     </div></div>`;}).join("");
   return `<h2 class="title">${IC('cart')}공지 · 발주</h2>${seg}
     ${waitCnt?`<button class="btn sec" style="margin-bottom:10px" onclick="copyOrders()">${IC('copy','li sm')} 대기 발주 복사 (${waitCnt}건) — 붙여넣어 전달</button>`:''}
     ${list||'<p class="muted" style="padding:10px 2px">아직 발주 요청이 없습니다. 필요한 물건을 적어주세요.</p>'}
     <div class="row" style="gap:7px;margin-top:10px">
       <input class="inp" id="odText" style="flex:1" placeholder="필요한 물건 (예: 우유 2팩)" onkeydown="if(event.key==='Enter')addOrder()">
       <button class="btn" style="width:auto;padding:0 16px" onclick="addOrder()">등록</button></div>
     <p class="muted" style="font-size:11px;margin-top:8px;text-align:center">대기 → 복사해 전달하면 <b>발주됨</b> → 물건 확인 후 ${admin?'체크박스로 <b>구매완료</b>':'대표님이 체크하면 <b>구매완료</b>'}</p>`;
 }
 let list=NOTICES.map(n=>`<div class="note"><div class="nm">
   <span class="pill" style="${n.gold?'background:#fdf2d8;color:#a16207':''}">${n.tag}</span>${n.who}</div>
   <div class="dt">${n.dt}</div><div class="bd">${n.bd}</div></div>`).join("");
 return `<h2 class="title">${IC('bell')}공지 · 발주</h2>${seg}
   <div class="card"><h3>${admin?'공지 올리기':'인수인계 남기기'}</h3>
     <textarea class="inp" id="hoText" placeholder="${admin?'전 직원에게 보이는 공지를 작성하세요':'예: 우유 1팩 남음, 3번 테이블 의자 흔들림…'}"></textarea>
     <button class="btn" style="margin-top:8px" onclick="addNote()">등록</button></div>
   ${list}`;
}
function addOrder(){
 const v=$("odText").value.trim();if(!v){toast('물건을 입력하세요');return;}
 ORDERS.push({who:curUser().name,txt:v,dt:fmtDT(),ts:Date.now(),st:'wait'});render();toast('발주 요청이 등록되었습니다');
}
function toggleOrder(i){
 if(role!=='admin'){toast('구매 체크는 대표님·매니저만 할 수 있어요');return;}
 const o=ORDERS[i];
 o.st = o.st==='done' ? 'ordered' : 'done';
 render();toast(o.st==='done'?'구매완료 처리했습니다':'발주됨으로 되돌렸습니다');
}
/* 대기 발주 복사 → 붙여넣기용 텍스트, 복사되면 자동 '발주됨' */
function copyOrders(){
 const wait=ORDERS.filter(o=>o.st==='wait');
 if(!wait.length){toast('복사할 대기 항목이 없습니다');return;}
 const n=new Date();
 const txt=`[FarmPlanet 발주 요청 ${n.getMonth()+1}/${n.getDate()}]\n`+wait.map(o=>`- ${o.txt} (${o.who})`).join('\n');
 const ok=()=>{wait.forEach(o=>o.st='ordered');render();toast(wait.length+'건 복사 완료 — 발주됨으로 표시했습니다');};
 if(navigator.clipboard&&navigator.clipboard.writeText){
   navigator.clipboard.writeText(txt).then(ok).catch(()=>copyFallback(txt,ok));
 }else copyFallback(txt,ok);
}
function copyFallback(txt,cb){
 const ta=document.createElement('textarea');ta.value=txt;
 document.body.appendChild(ta);ta.select();
 let done=false; try{done=document.execCommand('copy');}catch(e){}
 ta.remove();
 if(done)cb(); else openModal(`<h3>복사가 안 되는 환경이에요 — 길게 눌러 복사하세요</h3>
   <textarea class="inp" style="min-height:140px" readonly onclick="this.select()">${txt}</textarea>
   <button class="btn sec" style="margin-top:10px" onclick="closeModal()">닫기</button>`);
}
function addNote(){
 const v=$("hoText").value.trim();if(!v){toast('내용을 입력하세요');return;}
 NOTICES.unshift({tag:role==='admin'?'공지':'인수인계',gold:role==='admin',who:curUser().name,dt:fmtDT(),ts:Date.now(),bd:v});
 render();toast('등록되었습니다');
}

/* ═══════════ 모달 · 네비 · 렌더 ═══════════ */
function openModal(h){$("mbox").innerHTML=h;$("modal").classList.add("show");}
function closeModal(){$("modal").classList.remove("show");}
const NAV=[["home","home","홈"],["sched","cal","시간표"],["close","check","오픈·마감"],["manual","book","매뉴얼"],["notice","bell","공지·발주"]];
function render(){
 if(!CUR){$("screen").innerHTML=screenLogin();$("nav").innerHTML='';save();return;}
 let html="";
 if(tab==="closeAdmin" && role==="admin") html=screenAdmin();
 else if(tab==="home") html=screenHome();
 else if(tab==="manual") html=screenManual();
 else if(tab==="sched") html=screenSched();
 else if(tab==="close") html=screenClose();
 else if(tab==="notice") html=screenNotice();
 $("screen").innerHTML=html;
 if(tab==="manual") renderManual($("msearch")?.value||"");
 const navTab=tab==='closeAdmin'?'close':tab;
 const u=CUR?unread():{n:0,o:0};
 $("nav").innerHTML=NAV.map(n=>`<button class="${navTab===n[0]?'on':''}" onclick="go('${n[0]}')" style="position:relative">
   ${IC(n[1],'li lg')}${n[2]}${n[0]==='notice'&&(u.n+u.o)?'<span class="ndot"></span>':''}</button>`).join("");
 save();
}
/* 부팅 */
load();
if(CUR){const s=curUser();if(s){role=isAdmin(s)?'admin':'staff';const b=$("userBtn");b.style.display='';b.textContent=s.name+' ⏻';}else CUR=null;}
render();
/* 새 버전 감지 → 상단 배너 */
async function checkUpdate(){
 try{
  if(location.protocol==='file:')return;
  const res=await fetch('index.html?u='+Date.now(),{cache:'no-store'});
  if(!res.ok)return;
  const m=(await res.text()).match(/APP_VER='([^']+)'/);
  if(m&&m[1]!==APP_VER)$('upd').style.display='flex';
 }catch(e){}
}
checkUpdate();
setInterval(checkUpdate,5*60*1000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)checkUpdate();});

</script>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js");</script>
</body>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FAFCF8">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>FarmPlanet</title>
<style>
:root{
 --bg:#FAFCF8; --card:#FFFFFF; --edge:#E8EDE6;
 --ink:#2B3230; --deep:#2E8C49; --deep2:#256F3B; --btn:#3FA05A;
 --sub:#9AA79D; --coral:#ff7d59; --warn:#c2410c;
 --peak:#f3e8ff;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#eef1ec;display:flex;justify-content:center}
.app{width:100%;max-width:430px;height:100dvh;background:var(--bg);display:flex;flex-direction:column;position:relative}
@media(min-width:500px){body{padding:18px 0}.app{height:calc(100dvh - 36px);border-radius:24px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.18)}}
svg.li{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex:none;vertical-align:-3px}
svg.li.lg{width:20px;height:20px} svg.li.sm{width:13px;height:13px}
/* 상단 */
.top{padding:12px 16px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--edge)}
.logo{display:flex;align-items:center}
.brandimg{height:19px;display:block}
.role{border:1px solid var(--edge);background:#F0F4EE;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--sub);cursor:pointer}
/* 본문 */
.screen{flex:1;overflow-y:auto;padding:6px 16px 20px}
.title{font-size:17px;font-weight:800;margin:6px 0 10px;display:flex;align-items:center;gap:6px}
.title svg.li{color:var(--deep)}
.hero{background:linear-gradient(135deg,#43AB60,#2E8C49);border-radius:8px;padding:16px;color:#fff;margin-bottom:12px;box-shadow:0 6px 16px rgba(62,160,90,.22)}
.hero .hi{font-size:11px;opacity:.85}
.hero .big{font-size:17px;font-weight:800;margin:4px 0}
.hero .sh{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.16);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.qbtn{background:var(--card);border:1px solid var(--edge);border-radius:8px;padding:13px 12px;cursor:pointer;font-size:12.5px;font-weight:700;color:var(--ink)}
.qbtn svg.li{color:var(--deep);display:block;margin-bottom:6px;width:20px;height:20px}
.qbtn .bdg{color:var(--coral);font-weight:800}
.card{background:var(--card);border:1px solid var(--edge);border-radius:8px;padding:13px 14px;margin-bottom:10px}
.card h3{font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:5px;color:var(--ink)}
.card h3 svg.li{color:var(--deep)}
.muted{color:var(--sub);font-size:12.5px;line-height:1.6}
.note-card{background:#EDF7F0;border:1px solid #DBE9DD}
.grp{font-size:11.5px;font-weight:800;color:var(--deep);margin:13px 0 7px;display:flex;align-items:center;gap:5px}
.btn{width:100%;border:none;border-radius:7px;background:var(--btn);color:#fff;padding:13px;font-size:13.5px;font-weight:800;cursor:pointer}
.btn:disabled{background:#dbe3da;color:#9aa79d}
.btn.sec{background:#fff;color:var(--deep);border:1.5px solid var(--edge);font-weight:700}
.row{display:flex;gap:8px}
.row .btn{flex:1}
.seg{display:flex;gap:6px;margin-bottom:11px}
.seg button{flex:1;border:1px solid var(--edge);background:#fff;color:var(--sub);border-radius:7px;padding:9px 0;font-size:12px;font-weight:800;cursor:pointer}
.seg button.on{background:var(--deep);border-color:var(--deep);color:#fff}
.pill{background:#EDF7F0;color:var(--deep);border-radius:6px;padding:2px 8px;font-size:10.5px;font-weight:800}
.pill.hot{background:#fdeceb;color:#b04a3f}.pill.ice{background:#e3f0fb;color:#2b6cb0}
.search{width:100%;border:1px solid var(--edge);border-radius:7px;padding:11px 13px;font-size:13px;margin-bottom:11px;background:#fff}
.inp{width:100%;border:1px solid var(--edge);border-radius:7px;padding:11px;font-size:13px;background:#fff;font-family:inherit;min-height:64px;resize:none}
input.inp{min-height:auto}
/* 체크리스트 */
.ck{background:#fff;border:1px solid var(--edge);border-radius:7px;padding:10px 12px;display:flex;gap:10px;align-items:center;margin-bottom:6px}
.ck .box{width:19px;height:19px;border-radius:5px;border:1.6px solid #cfd8cf;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;cursor:pointer}
.ck.done .box{background:var(--btn);border-color:var(--btn)}
.ck .tx{font-size:12.5px;font-weight:600;flex:1}
.ck.done .tx{color:#a9bfae;text-decoration:line-through}
.prog{height:6px;background:var(--edge);border-radius:4px;margin:6px 0 12px}
.prog i{display:block;height:6px;border-radius:4px;background:linear-gradient(90deg,#43AB60,#2E8C49)}
.warnbox{background:#fdf3e7;border:1px solid #f0d9bd;color:#8a5a1f;border-radius:7px;padding:10px 12px;font-size:12px;line-height:1.6}
.cam{border:1px solid var(--edge);background:#fff;color:var(--deep);border-radius:6px;padding:6px 10px;font-size:11px;font-weight:800;cursor:pointer;flex:none}
/* 매뉴얼 */
.acc{background:#fff;border:1px solid var(--edge);border-radius:8px;margin-bottom:8px;overflow:hidden}
.acc .h{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;font-size:13px;font-weight:800;cursor:pointer}
.acc .b{display:none;padding:0 14px 13px;font-size:12.5px;line-height:1.7;color:#4a5c4f}
.acc.open .b{display:block}
.acc .chev{color:var(--sub);transition:.15s}
.acc.open .chev{transform:rotate(180deg)}
.clean{list-style:none}.clean li{padding:4px 0 4px 14px;position:relative}
.clean li::before{content:"·";position:absolute;left:2px;color:var(--deep);font-weight:900}
.step{margin-left:18px}.step li{padding:3px 0}
.ritem{background:#fff;border:1px solid var(--edge);border-radius:8px;padding:11px 13px;margin-bottom:8px}
.ritem .rn{font-size:13px;font-weight:800;margin-bottom:6px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.mimg{width:100%;border-radius:7px;border:1px solid var(--edge);margin:8px 0}
.rtable{width:100%;border-collapse:collapse;font-size:12px}
.rtable td{padding:4px 6px;border-top:1px solid #f2f4f0;color:#4a5c4f}
.rtable td:first-child{color:var(--sub);width:88px;font-weight:700}
/* 공지 */
.note{background:#fff;border:1px solid var(--edge);border-radius:8px;padding:12px 13px;margin-bottom:8px}
.note .nm{font-size:12px;font-weight:800;display:flex;gap:6px;align-items:center}
.note .dt{font-size:10.5px;color:var(--sub);margin:2px 0 6px}
.note .bd{font-size:12.5px;line-height:1.65;color:#3d4f42}
/* 발주방 */
.omsg{margin-bottom:6px}
.oday{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;color:var(--sub);border-radius:8px;padding:9px 12px;margin:12px 0 8px;cursor:pointer}
.oday.open{background:#EDF1EA}
.oday.open.done{background:#EDF7F0;color:var(--deep)}
.oday.fold{background:transparent;border:1.5px dashed var(--edge);color:var(--sub);font-weight:700}
.oday .odmeta{margin-left:auto;font-weight:400;font-size:11px}
.oday .odchev{font-weight:700;font-size:11px;flex:none}
.ordscroll{margin-bottom:10px}
.onav{display:flex;align-items:center;gap:8px;margin:2px 0 12px}
.onbtn{flex:none;width:40px;height:42px;border:1px solid var(--edge);background:#fff;border-radius:9px;font-size:22px;color:var(--deep);cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center}
.onbtn:active{background:#F0F4EE}
.ondate{flex:1;position:relative;display:flex;align-items:center;justify-content:center;gap:8px;height:42px;background:#F0F4EE;border:1px solid var(--edge);border-radius:9px;font-size:15px;font-weight:800;color:var(--ink);cursor:pointer}
.ondate input[type=date]{position:absolute;inset:0;opacity:0;width:100%;height:100%;border:0;margin:0;padding:0;cursor:pointer}
.odbadge{font-size:11px;font-weight:800;color:#fff;background:#ff7d59;border-radius:20px;padding:2px 9px}
.odcar{font-size:10px;color:var(--sub)}
.ordday{min-height:60px;margin-bottom:12px}
.ocal{background:#fff;border:1px solid var(--edge);border-radius:12px;padding:11px;margin:0 0 12px}
.ocalhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;font-weight:800;font-size:14.5px;color:var(--ink)}
.ocalhd button{flex:none;width:32px;height:32px;border:0;background:#F0F4EE;border-radius:8px;font-size:17px;color:var(--deep);cursor:pointer;line-height:1}
.ocalgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.ocaldow{text-align:center;font-size:10.5px;color:var(--sub);font-weight:700;padding:2px 0}
.ocell{position:relative;aspect-ratio:1;border:0;background:transparent;border-radius:9px;font-size:13px;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.ocell.empty{cursor:default}
.ocell.today{outline:1.5px solid #cfe0d3;outline-offset:-1.5px}
.ocell.pend{background:#fdf1e3}
.ocell.sel{background:var(--deep);color:#fff;font-weight:800}
.ocpill{position:absolute;bottom:2px;left:0;right:0;font-size:8px;font-weight:800;color:#c07d3a;line-height:1}
.ocell.sel .ocpill{color:#e9f6ec}
.acalhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:16px;color:var(--ink)}
.acalhd button{flex:none;width:32px;height:32px;border:0;background:#F0F4EE;border-radius:8px;font-size:17px;color:var(--deep);cursor:pointer;line-height:1}
.asumrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.apill{background:#EDF1EA;border-radius:20px;padding:5px 13px;font-size:13.5px;font-weight:800;color:var(--ink)}
.acalgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.acaldow{text-align:center;font-size:10.5px;font-weight:700;padding:3px 0}
.acell{position:relative;min-height:48px;border:0;background:transparent;border-radius:8px;cursor:default;display:flex;flex-direction:column;align-items:center;padding:4px 0 3px}
.acell.has{cursor:pointer}
.acell.has:active{background:#F0F4EE}
.acell .ad{font-size:12.5px;color:var(--ink);width:23px;height:23px;display:flex;align-items:center;justify-content:center}
.acell.today .ad{background:var(--deep);color:#fff;border-radius:50%;font-weight:800}
.acell .aw{font-size:8.5px;font-weight:800;color:var(--deep);margin-top:2px;line-height:1.05;text-align:center}
.ometa{font-size:10.5px;color:var(--sub);margin:0 0 3px 4px}
.obub{background:#fff;border:1px solid var(--edge);border-radius:2px 10px 10px 10px;padding:9px 10px;display:flex;align-items:center;gap:6px;max-width:100%}
.obx{width:19px;height:19px;border-radius:5px;border:1.6px solid #cfd8cf;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.obub.done .obx{background:var(--btn);border-color:var(--btn)}
.otx{font-size:13px;font-weight:600}
.obub.done .otx{color:#a9bfae;text-decoration:line-through}
.ost{margin-left:auto;font-size:10px;font-weight:800;color:var(--coral);flex:none}
.obub.done .ost{color:var(--deep)}
.oact{font-size:10px;font-weight:700;color:var(--sub);cursor:pointer;padding:2px 6px;border:1px solid var(--edge);border-radius:6px;background:#fff;flex:none}
.oact.del{color:var(--warn);border-color:#f0d9bd}
/* 시간표 */
.dsel{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.dchip{border:1px solid var(--edge);background:#fff;color:var(--ink);border-radius:6px;padding:6px 9px;font-size:11px;font-weight:700;cursor:pointer}
.dchip.on{background:var(--deep);border-color:var(--deep);color:#fff}
.wnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.wnav .wk{font-size:12.5px;font-weight:800;color:var(--ink)}
.wnav button{border:1px solid var(--edge);background:#fff;border-radius:6px;width:30px;height:30px;cursor:pointer;color:var(--deep);display:flex;align-items:center;justify-content:center}
.wnav .now{width:auto;padding:0 10px;font-size:11px;font-weight:800}
.wcal{display:flex;gap:2px;margin-bottom:4px}
.wtime{width:18px;flex:none;position:relative;margin-top:34px;height:242px}
.wtime span{position:absolute;right:2px;font-size:8px;color:var(--sub);transform:translateY(-50%)}
.wcol{flex:1;min-width:0;display:flex;flex-direction:column}
.wch{font-size:11px;font-weight:800;text-align:center;color:var(--deep);padding:4px 0;line-height:1.25;cursor:pointer;border-radius:6px}
.wch .wadd{color:var(--btn);font-weight:900}
.wcol.wtoday .wch{background:#E2F0E7}
.wbody{position:relative;height:242px;border-radius:6px;overflow:hidden;background:#fff;
  background-image:repeating-linear-gradient(to bottom,#edf1ea 0 1px,transparent 1px 44px);border:1px solid var(--edge)}
.wpeak{position:absolute;left:0;right:0;background:var(--peak);opacity:.7}
.wsh{position:absolute;color:#3c4a40;font-weight:700;padding:2px 1px;text-align:center;
  overflow:hidden;cursor:pointer;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center}
.z7 .wsh{font-size:9px;line-height:1.25}
.wsh.ov{box-shadow:inset 0 0 0 1.5px #fff,0 1px 3px rgba(0,0,0,.18);border-radius:3px}
.wsh .wt{display:block;font-weight:400;opacity:.85;white-space:nowrap}
.z7 .wsh .wt{font-size:8px}
.wcov{text-align:center;font-size:12px;padding:3px 0;cursor:pointer}
.wcov .wcn{font-size:9px;color:var(--sub);margin-left:2px}
.tl{position:relative;background:#fff;border:1px solid var(--edge);border-radius:7px;padding:10px 6px 22px;overflow:hidden}
.tl .peak{position:absolute;top:0;bottom:0;background:var(--peak);opacity:.7}
.tlrow{display:flex;align-items:center;margin-bottom:7px;position:relative}
.tlname{width:52px;font-size:11px;font-weight:700;flex:none;padding-left:4px}
.tltrack{position:relative;flex:1;height:24px;background:#f2f4f0;border-radius:5px;overflow:hidden}
.tlbar{position:absolute;top:2px;bottom:2px;border-radius:4px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;white-space:nowrap}
.tlaxis{position:absolute;bottom:4px;left:58px;right:6px;height:12px}
.tlaxis span{position:absolute;font-size:8.5px;color:var(--sub);transform:translateX(-50%)}
.lrow{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid #f2f4f0}
.lrow.tot{border-top:2px solid var(--deep);border-bottom:none;margin-top:3px;padding-top:9px;font-size:14px}
/* 모달·토스트·네비 */
.modal{position:absolute;inset:0;background:rgba(20,35,25,.4);display:none;align-items:flex-end;justify-content:center;z-index:30}
.modal.show{display:flex}
.mbox{background:#fff;border-radius:14px 14px 0 0;width:100%;max-width:430px;padding:18px 16px 24px;max-height:82%;overflow-y:auto}
.mbox h3{font-size:15px;margin-bottom:12px}
.fld{margin-bottom:12px}
.fld label{font-size:12px;color:var(--sub);display:block;margin-bottom:5px;font-weight:700}
.tsel{width:100%;padding:11px;border:1.5px solid var(--edge);border-radius:7px;font-size:14px;background:#fff}
.upd{background:var(--deep);color:#fff;font-size:12px;font-weight:700;padding:9px 14px;display:flex;align-items:center;justify-content:center;gap:10px}
.upd button{border:none;border-radius:6px;background:#fff;color:var(--deep);font-size:11.5px;font-weight:800;padding:5px 12px;cursor:pointer}
.toast{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);background:#2B3230;color:#fff;font-size:12.5px;font-weight:700;
  padding:10px 18px;border-radius:8px;opacity:0;pointer-events:none;transition:.25s;z-index:40;white-space:nowrap;max-width:92%;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1}
.nav{display:flex;justify-content:space-around;background:#fff;border-top:1px solid var(--edge);padding:8px 0 max(10px,env(safe-area-inset-bottom))}
.nav button{border:none;background:none;color:#B7C0B8;font-size:9px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;width:60px}
.nav button.on{color:var(--deep)}
.ndot{position:absolute;top:-1px;right:12px;width:7px;height:7px;border-radius:50%;background:#2f80ed}
.bdotn{display:inline-block;width:7px;height:7px;border-radius:50%;background:#2f80ed;margin-left:5px;vertical-align:middle}
/* 로그인 */
.login-note{font-size:11.5px;color:var(--sub);text-align:center;line-height:1.7;margin-top:12px}
.reset{font-size:10.5px;color:#b5c4b9;text-align:center;margin-top:14px;cursor:pointer;text-decoration:underline}
#authOverlay{position:fixed;inset:0;z-index:120;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:28px;text-align:center}
#authOverlay .ttl{font-weight:800;color:var(--deep);font-size:20px;letter-spacing:.5px}
#authOverlay .sub{font-size:12.5px;color:var(--sub)}
#authMsg{font-size:12px;color:var(--sub);line-height:1.7;max-width:290px}
.authlink{color:var(--deep);text-decoration:underline;cursor:pointer;font-weight:700}
.astat{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:14px}
.astat .adot{width:9px;height:9px;border-radius:50%;flex:none}
.astat .astat-r{margin-left:auto;font-weight:400;font-size:12px;color:var(--sub)}
.abig{width:100%;height:96px;border:none;border-radius:14px;background:var(--btn);color:#fff;font-size:20px;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer}
.abig svg{width:26px;height:26px}
.atimer{border-radius:12px;padding:16px;text-align:center;margin-bottom:14px}
.atimer.grn{background:#EAF3DE}.atimer.amb{background:#FAEEDA}.atimer.done{background:#EDF7F0}
.atimer .albl{font-size:12px;margin-bottom:3px;color:var(--sub)}
.atimer.grn .albl{color:#3B6D11}.atimer.amb .albl{color:#854F0B}
.aclock{font-size:34px;font-weight:800;letter-spacing:1px;font-variant-numeric:tabular-nums;color:var(--ink)}
.atimer.grn .aclock{color:#173404}.atimer.amb .aclock{color:#412402}.atimer.done .aclock{color:var(--deep)}
.btn.adngr{background:var(--warn)}
.asum{text-align:center;font-size:12px;color:var(--sub);margin-top:12px;padding-top:10px;border-top:1px solid var(--edge)}
</style>
<script src="https://accounts.google.com/gsi/client" async></script>
</head>

 <symbol id="i-tv" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="12.5" rx="2"/><path d="M9 21h6"/></symbol>

function initStoreMap(){
 const el=$("lmap"); if(!el||!window.L)return;
 const c=STORE_LOC?[STORE_LOC.lat,STORE_LOC.lng]:[37.5665,126.9780];
 _lmap=L.map(el,{maxZoom:21}).setView(c, STORE_LOC?19:16);
 const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:21,maxNativeZoom:19,attribution:'Esri 위성'});
 const street=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'});
 sat.addTo(_lmap);
 L.control.layers({'위성':sat,'지도(글자)':street},null,{position:'topright'}).addTo(_lmap);
 _lmarker=L.marker(c,{draggable:true}).addTo(_lmap);
 const draw=()=>{ const ll=_lmarker.getLatLng(); if(_lcircle)_lmap.removeLayer(_lcircle); _lcircle=L.circle(ll,{radius:STORE_RADIUS,color:'#2E8C49',fillColor:'#3FA05A',fillOpacity:.12}).addTo(_lmap); reverseGeo(ll.lat,ll.lng); };
 draw(); _lmarker.on('move',draw);
 _lmap.on('click',e=>_lmarker.setLatLng(e.latlng));
 setTimeout(()=>_lmap.invalidateSize(),200);
 if(!STORE_LOC)locateMe();
}

   e=>toast(geoErrMsg(e))); }
function saveMapLoc(){ if(!_lmarker){toast('지도가 아직 안 떴어요 — 잠시 후 다시');return;} const ll=_lmarker.getLatLng();

let _revT=null;
function reverseGeo(lat,lng){ const el=$('pinAddr'); if(el)el.innerHTML='주소 확인 중…';
 clearTimeout(_revT);
 _revT=setTimeout(()=>{
   fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ko&zoom=18`,{headers:{'Accept':'application/json'}})
   .then(r=>r.json()).then(d=>{ const e=$('pinAddr'); if(!e)return;
     e.innerHTML = (d&&d.display_name)? '📍 선택 위치: <b>'+d.display_name.replace(/, 대한민국$/,'')+'</b>' : '📍 이 지점의 주소를 못 찾았어요 — 위성으로 확인하세요'; })
   .catch(()=>{ const e=$('pinAddr'); if(e)e.innerHTML='📍 주소 확인 실패 (인터넷 확인)'; });
 },500);
}
function geoSearch(){

 const box=$('geoRes'); if(box)box.innerHTML='<div class="muted" style="font-size:12px;padding:4px">검색 중…</div>';
 fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=6&countrycodes=kr&accept-language=ko&q=${encodeURIComponent(q)}`,{headers:{'Accept':'application/json'}})
  .then(r=>r.json()).then(list=>{ if(!box)return;
    if(!list||!list.length){box.innerHTML='<div class="muted" style="font-size:12px;padding:4px">결과가 없어요. 도로명 주소(예: ○○로 12)로 검색해 보세요.</div>';return;}

  }).catch(()=>{ if(box)box.innerHTML='<div class="muted" style="font-size:12px;padding:4px">검색 실패 — 인터넷을 확인하세요</div>'; });
}

/* ── Firebase 구글 로그인 (GIS + signInWithCredential) — iOS Safari/GitHub Pages 안정 방식 ── */
async function fbBoot(){
 try{
  const {initializeApp,getApps}=await import('https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js');
  const {getAuth,GoogleAuthProvider,signInWithCredential,onAuthStateChanged,signOut,setPersistence,browserLocalPersistence}
    =await import('https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js');
  const app=getApps().length?getApps()[0]:initializeApp(FIREBASE_CONFIG);
  _fbAuth=getAuth(app);
  await setPersistence(_fbAuth,browserLocalPersistence).catch(()=>{});
  _fbSignInCred=(idTok)=>signInWithCredential(_fbAuth,GoogleAuthProvider.credential(idTok));
  _fbSignOut=()=>signOut(_fbAuth);
  onAuthStateChanged(_fbAuth,(user)=>{ if(user)onFbLogin(user.email||''); else onFbLogout(); });
  gisStart();
 }catch(e){ console.warn('firebase 초기화 실패 → 폴백 로그인',e); fbFallbackBoot(); }
}

   if(!resp||!resp.credential){authMsg('로그인 토큰을 받지 못했습니다');return;}
   _fbSignInCred(resp.credential).catch(e=>authMsg('로그인 실패: '+(e.code||e.message||e)));
 }});

 if(SYNC_ENABLED && !_syncReady && !_authForce){
   _pendingUser=email; clearTimeout(_authTO);
   _authTO=setTimeout(()=>{ _authForce=true; if(_pendingUser){const e=_pendingUser;_pendingUser=null;onFbLogin(e);} },4000);
   return; }
 let s=STAFF.find(x=>(x.email||'').toLowerCase()===email);
 // 부트스트랩: 관리자 이메일인데 명단에 없으면 대표님 계정에 연결(최초 로그인 자가치유)

 else { // 신규 가입 — 누구나 가능. 이름만 정하면 직원 리스트에 추가됨
   CUR=null; role='staff'; $("userBtn").style.display='none'; pendingEmail=email;
   const gb=$('gsiButton'); if(gb)gb.style.display='none';
   showAuthOverlay(true);
   authMsg(`<div style="font-weight:800;color:var(--ink);font-size:13px;margin-bottom:3px">${email}</div>
     처음 오셨네요! <b>이름(성 포함)</b>을 입력하세요. 예: 김주함, 유예흔
     <div style="margin-top:10px;display:flex;gap:6px">
       <input id="signName" class="tsel" style="flex:1" placeholder="성 포함 이름 (예: 김주함)" autocomplete="off" onkeydown="if(event.key==='Enter')finishSignup()">
       <button class="btn" style="width:auto;padding:0 18px" onclick="finishSignup()">시작</button></div>
     <div style="margin-top:10px"><span class="authlink" onclick="fbRelogin()">다른 계정으로</span></div>`);
   setTimeout(()=>{const i=$('signName'); if(i)i.focus();},60); }

function segLayout(dkey){
 // 각 근무 = 온전한 직사각형. 겹침 그룹 안에서 레인(0=기본,전체폭)을 매기고
 // 렌더에서 레인1=오른쪽, 레인2=왼쪽… 번갈아 붙여 위로 겹친다.
 const list=[];
 STAFF.filter(s=>!onlyMine||s.id===CUR).forEach(s=>{
   getRanges(s.id+'|'+dkey).forEach((r,ri)=>list.push({s,sh:r,key:s.id+'#'+ri,a:t2n(r.s),b:t2n(r.e)}));
 });
 list.sort((p,q)=>p.a-q.a||p.b-q.b);
 const out=[]; let comp=[], compEnd=-1;
 const flush=()=>{ if(!comp.length)return;
   const lanes=[];
   comp.forEach(x=>{let li=lanes.findIndex(e=>e<=x.a); if(li<0){li=lanes.length;lanes.push(0);} lanes[li]=x.b; x.lane=li;});
   const cols=lanes.length; comp.forEach(x=>{x.cols=cols; out.push(x);}); comp=[];
 };
 list.forEach(x=>{ if(comp.length&&x.a<compEnd){comp.push(x);compEnd=Math.max(compEnd,x.b);} else {flush();comp=[x];compEnd=x.b;} });
 flush();
 return out;
}

 return `<div class="wcal z7"><div class="wtime">${times}</div>${cols}</div>

/* 근무 = 하루에 여러 구간 가능. 저장 형태: {s,e}(단일) 또는 {ranges:[{s,e},...]}(분할) */
function getRanges(key){const v=SHIFTS[key]; if(!v)return []; if(Array.isArray(v.ranges))return v.ranges; if(v.s)return [{s:v.s,e:v.e}]; return [];}
function setRanges(key,rs){ if(!rs||!rs.length){delete SHIFTS[key];return;}
 rs=rs.slice().sort((a,b)=>t2n(a.s)-t2n(b.s)); SHIFTS[key]= rs.length===1?{s:rs[0].s,e:rs[0].e}:{ranges:rs.map(r=>({s:r.s,e:r.e}))}; }
function rangesLabel(key){return getRanges(key).map(r=>cT(r.s)+'~'+cT(r.e)).join(', ');}
function parseRanges(v){ const parts=String(v).split(',').map(x=>x.trim()).filter(Boolean); if(!parts.length)return null;
 const out=[]; for(const p of parts){const r=parseRange(p); if(!r)return null; out.push(r);} return out; }
function parseRange(v){
 const m=String(v).trim().match(/^(\d{1,2})(?:[:시.](\d{1,2}))?\s*[~\-–]\s*(\d{1,2})(?:[:시.](\d{1,2}))?$/);
 if(!m)return null;
 let h1=+m[1],m1=+(m[2]||0),h2=+m[3],m2=+(m[4]||0);
 if(m[2]==='5')m1=30; if(m[4]==='5')m2=30;
 if(m1>59||m2>59)return null;
 if(h1<OPEN_H)h1+=12;
 if(h2<OPEN_H)h2+=12;
 if(h2*60+m2<=h1*60+m1)h2+=12;
 if(h1<OPEN_H||h2>CLOSE_H||h2*60+m2<=h1*60+m1)return null;
 const f=(h,mm)=>String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0');
 return {s:f(h1,m1),e:f(h2,m2)};
}

/* 예시 사진이 등록된 항목 = 사진으로만 완료 (모든 항목에 예시 내장 가능) */
function key(s){return s.replace(/[^a-z0-9가-힣]/gi,'').slice(0,20);}
function setCk(m){ckMode=m;render();}

function toggleCk(k,photoReq){

 render();}
const HASH_TH=17; // 예시 대조 허용 오차 (64비트 해밍거리)
function aHash(img){
 try{
  const cv=document.createElement('canvas');cv.width=8;cv.height=8;
  const cx=cv.getContext('2d');cx.drawImage(img,0,0,8,8);
  const d=cx.getImageData(0,0,8,8).data;let g=[],sum=0;
  for(let i=0;i<64;i++){const v=(d[i*4]*299+d[i*4+1]*587+d[i*4+2]*114)/1000;g.push(v);sum+=v;}
  const avg=sum/64;return g.map(v=>v>avg?'1':'0').join('');
 }catch(e){return null;}
}
function hamming(a,b){let n=0;for(let i=0;i<a.length;i++)if(a[i]!==b[i])n++;return n;}
function processImg(inp,cb){
 const f=inp.files&&inp.files[0]; if(!f)return;
 const r=new FileReader();
 r.onload=e=>{
   const img=new Image();
   img.onload=()=>{
     let url=e.target.result;
     try{
       const sc=Math.min(1,900/Math.max(img.width,img.height));
       const cv=document.createElement('canvas');
       cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
       cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
       url=cv.toDataURL('image/jpeg',0.72);
     }catch(err){}
     cb(url,aHash(img));
   };
   img.src=e.target.result;
 };
 r.readAsDataURL(f);
}
function capture(k,inp){
 const pk=ckMode+'|'+k;
 processImg(inp,(url,hash)=>tryPhoto(pk,k,url,hash));
}
function tryPhoto(pk,k,url,hash){
 const ref=REFS[pk];
 if(ref&&ref.hash&&hash&&hamming(ref.hash,hash)>HASH_TH){
   toast('예시 사진과 달라 보여요 — 같은 위치·구도로 다시 찍어주세요');return false;
 }
 ckPhotos()[pk]=url;
 ckToday()[ckMode][k]=true;
 render();toast('사진 확인 완료');return true;
}

function adjWeekday(y,mo,day){const d=new Date(y,mo,day);const w=d.getDay();
 if(w===6)d.setDate(day+2);else if(w===0)d.setDate(day+1);return d;}
function cleaningDaysOfMonth(y,mo){return [adjWeekday(y,mo,1),adjWeekday(y,mo,15)];}
function isCleaningDay(){const n=new Date();n.setHours(0,0,0,0);
 return cleaningDaysOfMonth(n.getFullYear(),n.getMonth()).some(c=>+c===+n);}
function nextCleaning(){const n=new Date();n.setHours(0,0,0,0);const cand=[];
 [0,1].forEach(off=>{const d=new Date(n.getFullYear(),n.getMonth()+off,1);
   cleaningDaysOfMonth(d.getFullYear(),d.getMonth()).forEach(c=>cand.push(c));});
 cand.sort((a,b)=>a-b);return cand.find(c=>+c>=+n)||cand[0];}

     ${names.length?`<span class="muted" style="font-size:11px">확인 ${names.length}명${admin?' · '+names.join(', '):''}</span>`:''}</div>`;
   return `<div class="note"><div class="nm">
   <span class="pill" style="${n.gold?'background:#fdf2d8;color:#a16207':''}">${n.tag}</span>${n.who}</div>
   <div class="dt">${n.dt}</div><div class="bd">${n.bd}</div>${foot}</div>`;}).join("");
 return `<h2 class="title">${IC('bell')}공지 · 인수인계</h2>
   ${pinned}
   <div class="card"><h3>${admin?'공지 올리기':'인수인계 남기기'}</h3>
     <textarea class="inp" id="hoText" placeholder="${admin?'전 직원에게 보이는 공지를 작성하세요':'예: 우유 1팩 남음, 3번 테이블 의자 흔들림…'}"></textarea>
     <button class="btn" style="margin-top:8px" onclick="addNote()">등록</button></div>
   ${list}`;
}
let ordDate=null; // 발주방에서 보고있는 날짜(ISO). null=오늘
let ordCalOpen=false, ordCalMonth=null; // 커스텀 달력 펼침 여부·표시중인 달(그달 1일 ISO)
function ordShift(d){ const b=new Date((ordDate||todayK())+'T00:00:00'); b.setDate(b.getDate()+d); ordDate=dk(b);
 if(ordCalOpen){const m=new Date((ordDate)+'T00:00:00'); ordCalMonth=dk(new Date(m.getFullYear(),m.getMonth(),1));} render(); }
function ordPick(iso){ if(iso)ordDate=iso; ordCalOpen=false; render(); }
function toggleOrdCal(){ ordCalOpen=!ordCalOpen; if(ordCalOpen){const m=new Date((ordDate||todayK())+'T00:00:00'); ordCalMonth=dk(new Date(m.getFullYear(),m.getMonth(),1));} render(); }
function ordCalShift(d){ const b=new Date((ordCalMonth||todayK())+'T00:00:00'); b.setMonth(b.getMonth()+d); ordCalMonth=dk(new Date(b.getFullYear(),b.getMonth(),1)); render(); }
function ordCalHTML(selISO){
 const base=new Date((ordCalMonth||selISO)+'T00:00:00'), y=base.getFullYear(), mo=base.getMonth();
 const lead=new Date(y,mo,1).getDay(), ndays=new Date(y,mo+1,0).getDate(), tk=todayK();
 const pend={}; ORDERS.forEach(o=>{ if(o.st==='wait'){const md=(o.dt||'').split(' ')[0]; pend[md]=(pend[md]||0)+1;} });
 let cells=''; for(let i=0;i<lead;i++) cells+='<div class="ocell empty"></div>';
 for(let d=1;d<=ndays;d++){ const iso=dk(new Date(y,mo,d)), md=(mo+1)+'/'+d, n=pend[md]||0, sel=iso===selISO, isT=iso===tk;
   cells+=`<button class="ocell${sel?' sel':''}${isT?' today':''}${n?' pend':''}" onclick="ordPick('${iso}')"><span>${d}</span>${n?`<span class="ocpill">대기${n}</span>`:''}</button>`; }
 const dows=WD.map(x=>`<div class="ocaldow">${x}</div>`).join('');
 return `<div class="ocal"><div class="ocalhd"><button onclick="ordCalShift(-1)" aria-label="이전 달">‹</button><span>${y}년 ${mo+1}월</span><button onclick="ordCalShift(1)" aria-label="다음 달">›</button></div>
   <div class="ocalgrid">${dows}${cells}</div>
   <div class="muted" style="font-size:10.5px;text-align:center;margin-top:7px"><span style="display:inline-block;width:9px;height:9px;background:#fdf1e3;border:1px solid #e9cfa8;border-radius:3px;vertical-align:-1px;margin-right:4px"></span>발주 대기가 남은 날</div></div>`;
}
function addOrder(){
 const v=$("odText").value.trim();if(!v){toast('물건을 입력하세요');return;}
 ORDERS.push({id:'o'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),who:curUser().name,txt:v,dt:fmtDT(),ts:Date.now(),mt:Date.now(),st:'wait'});
 ordDate=null; // 등록은 오늘 → 오늘 날짜로 이동해 보이게
 render();toast('발주 요청이 등록되었습니다');
}
function toggleOrder(i){
 if(role!=='admin'){toast('발주 체크는 대표님·매니저만 할 수 있어요');return;}
 const o=ORDERS[i];
 o.st = o.st==='ordered' ? 'wait' : 'ordered'; o.mt=Date.now();
 if(o.st==='ordered') o.od=fmtDT(); else delete o.od; // 실제 발주일 스탬프(요청일 o.dt는 보존)
 render();toast(o.st==='ordered'?'발주됨 처리했습니다':'대기로 되돌렸습니다');
}
function editOrder(i){const o=ORDERS[i];if(!o)return;
 const v=prompt('발주 내용 수정:',o.txt); if(v===null)return;
 if(!v.trim()){toast('내용을 입력하세요');return;}
 o.txt=v.trim(); o.mt=Date.now(); render(); toast('수정했습니다');}
function ordKey(o){ return (o&&o.id) || ((o&&o.ts||0)+'|'+(o&&o.txt||'')); }
function deleteOrder(i){const o=ORDERS[i];if(!o)return; const k=ordKey(o), txt=o.txt;
 askConfirm(`발주 <b>"${txt}"</b> 을(를) 삭제합니다.`,'삭제',()=>{
   ODEL=[...new Set([...(ODEL||[]),k])];
   ORDERS=ORDERS.filter(x=>ordKey(x)!==k); save(); render(); toast('발주를 삭제했습니다');});}
/* 대기 발주 복사 → 카톡 붙여넣기용 텍스트만 생성 (발주됨 체크는 별도 수동) */
function copyOrders(){
 const wait=ORDERS.filter(o=>o.st==='wait');
 if(!wait.length){toast('복사할 대기 항목이 없습니다');return;}
 const n=new Date();
 const txt=`[FarmPlanet 발주 요청 ${n.getMonth()+1}/${n.getDate()}]\n`+wait.map(o=>`- ${o.txt}`).join('\n');
 const ok=()=>{toast(wait.length+'건 복사 완료 — 카톡에 붙여넣어 전달하세요');};
 if(navigator.clipboard&&navigator.clipboard.writeText){
   navigator.clipboard.writeText(txt).then(ok).catch(()=>copyFallback(txt,ok));
 }else copyFallback(txt,ok);
}
function copyFallback(txt,cb){
 const ta=document.createElement('textarea');ta.value=txt;
 document.body.appendChild(ta);ta.select();
 let done=false; try{done=document.execCommand('copy');}catch(e){}
 ta.remove();
 if(done)cb(); else openModal(`<h3>복사가 안 되는 환경이에요 — 길게 눌러 복사하세요</h3>
   <textarea class="inp" style="min-height:140px" readonly onclick="this.select()">${txt}</textarea>
   <button class="btn sec" style="margin-top:10px" onclick="closeModal()">닫기</button>`);
}
function addNote(){
 const v=$("hoText").value.trim();if(!v){toast('내용을 입력하세요');return;}
 NOTICES.unshift({tag:role==='admin'?'공지':'인수인계',gold:role==='admin',who:curUser().name,dt:fmtDT(),ts:Date.now(),bd:v});
 render();toast('등록되었습니다');
}

/* ═══════════ 모달 · 네비 · 렌더 ═══════════ */
function openModal(h){$("mbox").innerHTML=h;$("modal").classList.add("show");}
function closeModal(){$("modal").classList.remove("show");}
let _confirmCb=null;
function askConfirm(msg,yesLabel,cb){ _confirmCb=cb;
 openModal(`<h3 style="color:var(--ink)">정말 진행할까요?</h3>
   <p style="margin:10px 0 18px;line-height:1.65;font-size:13.5px;color:var(--sub)">${msg}</p>
   <div class="row"><button class="btn sec" onclick="closeModal()">취소</button>
     <button class="btn" style="background:var(--warn)" onclick="runConfirm()">${yesLabel||'확인'}</button></div>`);}
function runConfirm(){const cb=_confirmCb;_confirmCb=null;closeModal();if(cb)cb();}
const NAV=[["home","home","홈"],["att","clock","근태"],["sched","cal","시간표"],["order","cart","발주"]];
function render(){
 if(CUR&&!curUser()){ CUR=null; if(USE_FB){showAuthOverlay(true);} } // 내 계정이 사라지면 재로그인
 if(CUR){role=isAdmin(curUser())?'admin':'staff';} // 권한 항상 최신화
 if(CUR){const cu=curUser(); if(cu&&cu.pending&&!isAdmin(cu)){$("screen").innerHTML=screenPending(cu);$("nav").innerHTML='';save();return;}}
 if(!CUR){$("screen").innerHTML=screenLogin();$("nav").innerHTML='';save();return;}
 let html="";
 if(tab==="closeAdmin" && role==="admin") html=screenAdmin();
 else if(tab==="home") html=screenHome();
 else if(tab==="manual") html=screenManual();
 else if(tab==="att") html=screenAtt();
 else if(tab==="sched") html=screenSched();
 else if(tab==="close") html=screenClose();
 else if(tab==="notice") html=screenNotice();
 else if(tab==="order") html=screenNotice();
 $("screen").innerHTML=html;
 if(tab==="manual") renderManual($("msearch")?.value||"");
 const navTab=(tab==='close'||tab==='manual'||tab==='closeAdmin'||tab==='notice')?'home':tab;
 const u=CUR?unread():{n:0,o:0,sched:0};
 $("nav").innerHTML=NAV.map(n=>{
   const dot=(n[0]==='order'&&u.o)||(n[0]==='sched'&&u.sched)||(n[0]==='att'&&isAdmin(curUser())&&attReqCount());
   return `<button class="${navTab===n[0]?'on':''}" onclick="go('${n[0]}')" style="position:relative">
   ${IC(n[1],'li lg')}${n[2]}${dot?'<span class="ndot"></span>':''}</button>`;}).join("");
 save();
}
/* 부팅 */
load();
if(USE_FB){
 CUR=null;                 // 신원은 구글 인증으로 결정
 showAuthOverlay(true);
 render();                 // 뒤 배경 렌더 (오버레이가 덮음)
 fbBoot();
}else{
 if(CUR){const s=curUser();if(s){role=isAdmin(s)?'admin':'staff';const b=$("userBtn");b.style.display='';b.textContent=s.name+' ⏻';}else CUR=null;}
 render();
}
/* 서비스워커 등록 (네트워크 우선 = 항상 최신, 오프라인 지원) */
if('serviceWorker' in navigator && location.protocol!=='file:'){
 navigator.serviceWorker.register('sw.js').catch(()=>{});
}
/* 캐시 무시 강제 새로고침 — iOS 홈화면 앱의 옛 캐시 우회 */
async function hardReload(){
 try{ if(window.caches){const ks=await caches.keys(); await Promise.all(ks.map(k=>caches.delete(k)));} }catch(e){}
 location.replace(location.pathname.split('?')[0]+'?v='+Date.now());
}
if(SYNC_ENABLED)syncBoot();
/* 새 버전 감지 → 상단 배너 */
async function checkUpdate(){
 try{
  if(location.protocol==='file:')return;
  const res=await fetch('index.html?u='+Date.now(),{cache:'no-store'});
  if(!res.ok)return;
  const m=(await res.text()).match(/APP_VER='([^']+)'/);
  if(m&&m[1]!==APP_VER)$('upd').style.display='flex';
 }catch(e){}
}
checkUpdate();
setInterval(checkUpdate,5*60*1000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)checkUpdate();});

</script>
